<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quotex AI Market Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>📊 Quotex AI মার্কেট অ্যানালাইজার</h2>
        <p class="subtitle">নিচের লাইভ ক্যামেরার সামনে চার্টটি ধরুন এবং স্ন্যাপশট নিন।</p>

        <!-- লাইভ ক্যামেরা ও প্রিভিউ বক্স -->
        <div class="camera-box">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div id="previewContainer" class="hidden">
                <img id="imagePreview" src="" alt="Captured Market">
            </div>
        </div>

        <!-- কন্ট্রোল বাটন সমূহ -->
        <div class="button-group">
            <button id="captureBtn" class="btn capture-btn">📸 স্ন্যাপশট তুলুন</button>
            <button id="analyzeBtn" class="btn analyze-btn hidden">🚀 মার্কেট অ্যানালাইসিস করুন</button>
            <button id="retakeBtn" class="btn retake-btn hidden">🔄 আবার তুলুন</button>
        </div>

        <!-- অ্যানালাইসিস রেজাল্ট -->
        <div id="resultBox" class="result-box hidden">
            <h3>📈 অ্যানালাইসিস রিপোর্ট (১ মিনিট)</h3>
            <div class="prediction">
                <p>মার্কেট মুভমেন্ট সম্ভাবনা:</p>
                <div class="percentage-bar">
                    <div class="up-bar" id="upBar" style="width: 0%;">UP: 0%</div>
                    <div class="down-bar" id="downBar" style="width: 0%;">DOWN: 0%</div>
                </div>
            </div>
            <p id="decisionText" class="decision"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
